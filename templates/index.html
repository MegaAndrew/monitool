<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>monitool</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap");
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a0c0e;
                --panel: #111416;
                --panel2: #161a1e;
                --border: #1e2428;
                --sidebar-width: 360px;
                --green: #00e676;
                --green-dim: #00c853;
                --green-bg: rgba(0, 230, 118, 0.08);
                --text: #cdd9e5;
                --muted: #546070;
                --red: #ff5252;
                --yellow: #ffd740;
                --blue: #40c4ff;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: "IBM Plex Sans", sans-serif;
                min-height: 100vh;
                overflow: hidden;
            }
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 230, 118, 0.008) 3px,
                    rgba(0, 230, 118, 0.008) 4px
                );
                pointer-events: none;
                z-index: 0;
            }
            body {
                max-height: 80vh;
            }
            .no-selection {
                -webkit-user-select: none; /* Safari */
                -moz-user-select: none; /* Firefox */
                -ms-user-select: none; /* Internet Explorer/Edge */
                user-select: none; /* Standard syntax */
            }

            /* HEADER */
            header {
                position: sticky;
                top: 0;
                z-index: 0;
                background: rgba(10, 12, 14, 0.95);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
                padding: 0 28px;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .logo {
                font-family: "IBM Plex Mono", monospace;
                font-size: 15px;
                font-weight: 600;
                color: var(--green);
                letter-spacing: -0.5px;
            }
            .logo span {
                color: var(--muted);
            }
            .header-center {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .status-bar {
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                color: var(--muted);
            }
            .status-bar strong {
                color: var(--green);
            }
            .header-button {
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                color: var(--muted);
                text-decoration: none;
                text-transform: uppercase;
                letter-spacing: 1px;
                border: 1px solid var(--border);
                padding: 5px 10px;
                transition: all 0.2s;
            }
            .header-button:hover {
                color: var(--red);
                border-color: var(--red);
            }

            /* MAIN */
            main {
                position: relative;
                z-index: 1;
                margin: 0;
                padding: 32px 28px;
                height: calc(100vh - 56px - 64px);
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .page-title {
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 24px;
            }
            .page-title strong {
                color: var(--text);
            }
            #script-count {
                color: var(--text);
                margin-top: 15px;
                margin-left: 15px;
            }
            .container {
                display: grid;
                grid-template:
                    "sidebar sidebar-resizer logs" 1fr /
                    minmax(260px, var(--sidebar-width)) 8px minmax(360px, 1fr);
                margin: 0;
                flex: 1;
                min-height: 0;
                height: 100%;
                width: 100%;
                max-width: none;
                min-width: 0;
                padding: 0;
            }
            .sidebar-container {
                grid-area: sidebar;
                min-width: 0;
                min-height: 0;
                background-color: var(--bg);
            }
            .sidebar-body {
                padding: 0 0 16px;
                scrollbar-width: thin;
                scrollbar-color: var(--muted) var(--bg);
                overflow-y: auto;
                height: 100%;
            }
            .sidebar-resizer {
                grid-area: sidebar-resizer;
                cursor: col-resize;
                min-width: 8px;
                position: relative;
                touch-action: none;
            }
            .sidebar-resizer::before {
                content: "";
                position: absolute;
                top: 0;
                bottom: 0;
                left: 3px;
                width: 1px;
                background: var(--border);
            }
            .sidebar-resizer:hover::before,
            body.sidebar-resizing .sidebar-resizer::before {
                background: var(--green);
            }
            body.sidebar-resizing {
                cursor: col-resize;
                user-select: none;
            }
            .logs-container {
                grid-area: logs;
                overflow-y: auto;
                min-height: 0;
                min-width: 0;
                height: 100%;
                width: 100%;
                padding: 0;
                scrollbar-width: thin;
                scrollbar-color: var(--muted) var(--bg);
            }

            /* GRID */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 16px;
            }

            /* CARD */
            .card {
                background: var(--panel);
                border: 1px solid var(--border);
                padding: 0;
                transition: border-color 0.2s;
                position: relative;
                overflow: hidden;
            }
            .card:hover {
                border-color: #2e3840;
            }
            .card-header {
                padding: 18px 20px 14px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: flex-start;
                gap: 12px;
            }
            .status-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                flex-shrink: 0;
                margin-top: 5px;
            }
            .status-dot.running {
                background: var(--green);
                box-shadow: 0 0 8px var(--green);
                animation: pulse 2s infinite;
            }
            .status-dot.stopped {
                background: var(--muted);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .card-title-wrap {
                flex: 1;
                min-width: 0;
            }
            .card-name {
                font-size: 14px;
                font-weight: 500;
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .card-desc {
                font-size: 12px;
                color: var(--muted);
                margin-top: 3px;
            }
            .card-body {
                padding: 14px 20px;
            }
            .meta {
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                color: var(--muted);
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .meta .cmd {
                color: var(--blue);
                background: rgba(64, 196, 255, 0.06);
                padding: 6px 10px;
                margin-top: 6px;
                white-space: nowrap;
                overflow-y: hidden;
                overflow-x: auto;
                -ms-overflow-style: none; /* Internet Explorer 10+ */
                scrollbar-width: none; /* Firefox, Safari 18.2+, Chromium 121+ */
                border-left: 2px solid rgba(64, 196, 255, 0.3);
            }
            .cmd::-webkit-scrollbar {
                display: none; /* Older Safari and Chromium */
            }
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 2px 8px;
                font-size: 10px;
                font-family: "IBM Plex Mono", monospace;
                text-transform: uppercase;
                letter-spacing: 1px;
                border: 1px solid;
            }
            .badge.running {
                color: var(--green);
                border-color: rgba(0, 230, 118, 0.3);
                background: var(--green-bg);
            }
            .badge.stopped {
                color: var(--muted);
                border-color: var(--border);
            }
            .pid {
                color: var(--muted);
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                margin-left: 8px;
            }
            input[type="color"] {
                display: inline-flex;
                align-items: center;
                height: 16px;
                border: 1px solid;
                color: var(--muted);
                border-color: var(--border);
                border-radius: 0.25rem;
                margin-left: 8px;
            }

            /* ACTIONS */
            .card-actions {
                padding: 14px 20px;
                border-top: 1px solid var(--border);
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .btn {
                font-family: "IBM Plex Mono", monospace;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 7px 14px;
                border: 1px solid;
                cursor: pointer;
                transition: all 0.15s;
                background: none;
            }
            .btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            .btn-start {
                color: var(--green);
                border-color: rgba(0, 230, 118, 0.4);
            }
            .btn-start:hover:not(:disabled) {
                background: none;
                border-color: rgba(0, 230, 118, 0.4);
            }
            .btn-stop {
                color: var(--red);
                border-color: rgba(255, 82, 82, 0.3);
            }
            .btn-stop:hover:not(:disabled) {
                background: none;
                border-color: rgba(255, 82, 82, 0.3);
            }
            .btn-restart {
                color: var(--yellow);
                border-color: rgba(255, 215, 64, 0.3);
            }
            .btn-restart:hover:not(:disabled) {
                background: none;
                border-color: rgba(255, 215, 64, 0.3);
            }
            .btn-logs {
                color: var(--blue);
                border-color: #2e3840;
            }
            .btn-logs:hover:not(:disabled) {
                background: none;
                border-color: #2e3840;
            }
            .btn-clear {
                color: rgba(255, 82, 82, 0.3);
                border-color: var(--red);
            }
            .btn-clear:hover:not(:disabled) {
                background: none;
                border-color: var(--red);
            }

            /* LOG MODAL */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.75);
                z-index: 200;
                backdrop-filter: blur(4px);
            }
            .modal-overlay.open {
                display: flex;
                align-items: flex-end;
                justify-content: stretch;
            }
            @media (min-width: 700px) {
                .modal-overlay.open {
                    align-items: center;
                    justify-content: center;
                }
            }
            .modal {
                background: var(--panel);
                border: 1px solid var(--border);
                width: 100%;
                max-width: 860px;
                max-height: 85vh;
                display: flex;
                flex-direction: column;
                margin: 0 auto;
            }
            .modal-header {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }
            .modal-title {
                font-family: "IBM Plex Mono", monospace;
                font-size: 13px;
                font-weight: 600;
                color: var(--green);
            }
            .modal-close {
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 20px;
                line-height: 1;
                padding: 2px 6px;
            }
            .modal-close:hover {
                color: var(--text);
            }
            .modal-toolbar {
                padding: 10px 20px;
                border-bottom: 1px solid var(--border);
                display: flex;
                gap: 8px;
                flex-shrink: 0;
            }
            .log-wrap {
                flex: 1;
                overflow-y: auto;
                padding: 0;
            }
            .log-output {
                font-family: "IBM Plex Mono", monospace;
                font-size: 12px;
                line-height: 1.7;
                color: #8fa0b0;
                padding: 4px 5px;
                flex: 0 0 auto;
                border: 1px solid var(--panel2);
                border-radius: 5px;
                margin-bottom: 2px;
            }
            .log-output .line {
                display: block;
                white-space: pre-wrap;
                word-break: break-all;
            }
            .log-output .line.meta {
                color: var(--muted);
                font-style: italic;
            }
            .log-output .line.err {
                color: var(--red);
            }
            .log-output .line.start {
                color: var(--green);
            }
            .live-indicator {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-family: "IBM Plex Mono", monospace;
                font-size: 10px;
                color: var(--green);
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .live-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--green);
                animation: pulse 1s infinite;
            }
            .live-indicator.off {
                color: var(--muted);
            }
            .live-indicator.off .live-dot {
                background: var(--muted);
                animation: none;
            }

            /* TOAST */
            .toast-wrap {
                position: fixed;
                bottom: 28px;
                right: 28px;
                z-index: 300;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .toast {
                font-family: "IBM Plex Mono", monospace;
                font-size: 12px;
                padding: 10px 16px;
                border: 1px solid;
                animation: slide-in 0.2s ease;
                max-width: 320px;
            }
            .toast.ok {
                color: var(--green);
                border-color: rgba(0, 230, 118, 0.3);
                background: rgba(10, 12, 14, 0.95);
            }
            .toast.err {
                color: var(--red);
                border-color: rgba(255, 82, 82, 0.3);
                background: rgba(10, 12, 14, 0.95);
            }
            @keyframes slide-in {
                from {
                    opacity: 0;
                    transform: translateX(20px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo"><span>//</span> monitool</div>
            <div class="header-center">
                <a
                    class="header-button"
                    type="button"
                    onclick="resetSidebarWidth()"
                >
                    Reset sidebar
                </a>
                <a class="header-button" type="button" onclick="startAll()">
                    Start all
                </a>
                <a class="header-button" type="button" onclick="stopAll()">
                    Stop all
                </a>
                <a class="header-button" type="button" onclick="restartAll()">
                    Restart all
                </a>
                <a class="header-button" type="button" onclick="toggleScroll()">
                    Toggle scroll
                </a>
            </div>
            <div class="header-right">
                <a class="header-button" href="/logout">logout</a>
            </div>
        </header>

        <main>
            <div class="page-title">
                <span
                    >processes:
                    <span class="status-bar" id="status-bar">loading…</span>
                </span>
            </div>
            <div class="container" id="container">
                <div class="sidebar-container" id="sidebar-container">
                    <div class="sidebar-body" id="grid"></div>
                </div>
                <div
                    class="sidebar-resizer"
                    id="sidebar-resizer"
                    role="separator"
                    aria-orientation="vertical"
                    aria-label="Resize scripts sidebar"
                    aria-valuemin="260"
                ></div>
                <div
                    class="logs-container container-fluid"
                    id="logs-container"
                ></div>
            </div>
        </main>

        <div class="toast-wrap" id="toast-wrap"></div>

        <script>
            var enableScroll = true;
            const configToColor = new Map();
            const $ = (id) => document.getElementById(id);
            const sidebarWidthKey = "monitool.sidebarWidth";
            let scripts = [];
            const streams = new Map(); // id -> EventSource

            initSidebarResize();

            // ── SIDEBAR RESIZE ───────────────────────────────────────────────────────────
            function initSidebarResize() {
                const container = $("container");
                const resizer = $("sidebar-resizer");
                if (!container || !resizer) return;

                const savedWidth = Number(
                    localStorage.getItem(sidebarWidthKey),
                );
                if (Number.isFinite(savedWidth) && savedWidth > 0) {
                    setSidebarWidth(savedWidth);
                }

                resizer.addEventListener("pointerdown", (e) => {
                    e.preventDefault();
                    resizer.setPointerCapture(e.pointerId);
                    document.body.classList.add("sidebar-resizing");

                    const onMove = (moveEvent) => {
                        const rect = container.getBoundingClientRect();
                        setSidebarWidth(moveEvent.clientX - rect.left);
                    };

                    const onUp = (upEvent) => {
                        resizer.releasePointerCapture(upEvent.pointerId);
                        resizer.removeEventListener("pointermove", onMove);
                        resizer.removeEventListener("pointerup", onUp);
                        resizer.removeEventListener("pointercancel", onUp);
                        document.body.classList.remove("sidebar-resizing");
                        localStorage.setItem(
                            sidebarWidthKey,
                            parseInt(
                                getComputedStyle(
                                    document.documentElement,
                                ).getPropertyValue("--sidebar-width"),
                                10,
                            ),
                        );
                    };

                    resizer.addEventListener("pointermove", onMove);
                    resizer.addEventListener("pointerup", onUp);
                    resizer.addEventListener("pointercancel", onUp);
                });

                window.addEventListener("resize", () => {
                    const currentWidth = parseInt(
                        getComputedStyle(
                            document.documentElement,
                        ).getPropertyValue("--sidebar-width"),
                        10,
                    );
                    setSidebarWidth(currentWidth);
                });
            }

            function setSidebarWidth(width) {
                const container = $("container");
                const resizer = $("sidebar-resizer");
                const minWidth = 260;
                const maxWidth = Math.max(
                    minWidth,
                    container.getBoundingClientRect().width - 360,
                );
                const nextWidth = Math.min(Math.max(width, minWidth), maxWidth);

                document.documentElement.style.setProperty(
                    "--sidebar-width",
                    `${nextWidth}px`,
                );
                if (resizer) {
                    resizer.setAttribute("aria-valuenow", String(nextWidth));
                    resizer.setAttribute("aria-valuemax", String(maxWidth));
                }
                return nextWidth;
            }

            function resetSidebarWidth() {
                const width = setSidebarWidth(360);
                localStorage.setItem(sidebarWidthKey, width);
            }

            // ── POLLING ──────────────────────────────────────────────────────────────────
            async function fetchScripts() {
                try {
                    const r = await fetch("/api/scripts");
                    if (!r.ok) {
                        if (r.status === 401) location = "/login";
                        return;
                    }
                    scripts = await r.json();
                    renderGrid();
                    updateStatusBar();
                } catch (e) {}
            }

            setInterval(fetchScripts, 2500);
            fetchScripts();

            // ── RENDER ───────────────────────────────────────────────────────────────────
            function renderGrid() {
                const grid = $("grid");

                scripts.forEach((s) => {
                    let card = document.querySelector(`[data-id="${s.id}"]`);
                    if (!card) {
                        card = makeCard(s);
                        grid.appendChild(card);
                    } else {
                        updateCard(card, s);
                    }
                });

                document.querySelectorAll(".card[data-id]").forEach((c) => {
                    if (!scripts.find((s) => s.id === c.dataset.id)) c.remove();
                });
            }

            function makeCard(s) {
                const el = document.createElement("div");
                el.className = "card";
                el.dataset.id = s.id;
                el.innerHTML = cardHTML(s);
                el.querySelector(".btn-start").onclick = () =>
                    action(s.id, "start");
                el.querySelector(".btn-stop").onclick = () =>
                    action(s.id, "stop");
                el.querySelector(".btn-restart").onclick = () =>
                    action(s.id, "restart");
                el.querySelector(".btn-clear").onclick = () => clear(s.id);
                el.querySelector(".btn-logs").onclick = () =>
                    toggleLogs(s.id, s.name);
                return el;
            }

            function updateCard(card, s) {
                const running = s.status === "running";
                card.querySelector(".status-dot").className =
                    "status-dot " + s.status;
                card.querySelector(".status-badge").className =
                    "badge status-badge " + s.status;
                card.querySelector(".status-badge").textContent = s.status;
                const pidEl = card.querySelector(".pid");
                pidEl.textContent = s.pid ? "pid " + s.pid : "";
                card.querySelector(".btn-start").disabled = running;
                card.querySelector(".btn-stop").disabled = !running;
                card.querySelector(".btn-restart").disabled = false;
            }

            function cardHTML(s) {
                const running = s.status === "running";
                const color = randomHexColor();
                configToColor.set(s.id, color);
                return `
              <div class="card-header">
                <div class="status-dot ${s.status}"></div>
                <div class="card-title-wrap">
                  <div class="card-name">${esc(s.name)}</div>
                  ${s.description ? `<div class="card-desc">${esc(s.description)}</div>` : ""}
                </div>
              </div>
              <div class="card-body">
                <div class="meta">
                  <div style="display:flex;align-items:center">
                    <span class="badge status-badge ${s.status}">${s.status}</span>
                    <input type="color" id="color-${s.id}" value="${color}" colorspace="display-p3" onchange="colorOnChange(event)"/>
                    <span class="pid">${s.pid ? "pid " + s.pid : ""}</span>
                  </div>
                  <div class="cmd">${esc(s.command)}</div>
                </div>
              </div>
              <div class="card-actions">
                <button class="btn btn-start" ${running ? "disabled" : ""}>▶ start</button>
                <button class="btn btn-stop" ${!running ? "disabled" : ""}>■ stop</button>
                <button class="btn btn-restart">↺ restart</button>
                <button class="btn btn-clear">✕ clear</button>
                <button class="btn btn-logs">≡ logs</button>
              </div>
            `;
            }

            function colorOnChange(e) {
                if (e.target) {
                    const id = e.target.id.replace("color-", "");
                    const color = e.target.value;
                    configToColor.set(id, color);
                    document
                        .querySelectorAll(`.from-${id} span`)
                        .forEach((p) => {
                            p.style.background = color;
                        });
                }
            }

            function randomHexColor() {
                // Generate a random number between 0 and 16777215 (0xFFFFFF)
                const randomNum = Math.floor(Math.random() * 16777215);
                // Convert to hexadecimal string and pad with zeros to ensure 6 characters
                let color = `#${randomNum.toString(16).padStart(6, "0")}`;
                return color;
            }

            function randomRgbColor() {
                const red = Math.floor(Math.random() * 256); // Random number between 0-255
                const green = Math.floor(Math.random() * 256); // Random number between 0-255
                const blue = Math.floor(Math.random() * 256); // Random number between 0-255
                return `rgb(${red}, ${green}, ${blue})`;
            }

            function updateStatusBar() {
                const running = scripts.filter(
                    (s) => s.status === "running",
                ).length;
                $("status-bar").innerHTML =
                    `<strong>${running}</strong> / ${scripts.length} running`;
            }

            // ── ACTIONS ──────────────────────────────────────────────────────────────────
            async function action(id, act) {
                const btns = document.querySelectorAll(
                    `[data-id="${id}"] .btn`,
                );
                btns.forEach((b) => (b.disabled = true));
                try {
                    const r = await fetch(`/api/scripts/${id}/${act}`, {
                        method: "POST",
                    });
                    const data = await r.json();
                    if (!r.ok) toast("err", `${act} failed: ${data.error}`);
                    else {
                        toast("ok", `${id} → ${data.status}`);
                        await fetchScripts();
                    }
                } catch (e) {
                    toast("err", "request failed");
                }
                btns.forEach((b) => (b.disabled = false));
                await fetchScripts();
            }

            async function startAll() {
                renderGrid();
                scripts.forEach(async (s) => {
                    let card = document.querySelector(`[data-id="${s.id}"]`);
                    await action(s.id, "start");
                    updateCard(card, s);
                });
            }

            async function stopAll() {
                renderGrid();
                scripts.forEach(async (s) => {
                    let card = document.querySelector(`[data-id="${s.id}"]`);
                    await action(s.id, "stop");
                    console.log(`stopped ${s.id}`);
                    updateCard(card, s);
                });
            }

            async function restartAll() {
                renderGrid();
                scripts.forEach(async (s) => {
                    let card = document.querySelector(`[data-id="${s.id}"]`);
                    await action(s.id, "restart");
                    updateCard(card, s);
                });
            }

            async function clear(id) {
                const r = await fetch(`/api/scripts/${id}/logs`, {
                    method: "DELETE",
                });
                if (r.status == 204) {
                    toast("ok", `${id}`);
                    fetchScripts();
                    const container = document.getElementById("logs-container");
                    [...container.children].forEach((child) => {
                        if (child.classList.contains(`from-${id}`)) {
                            container.removeChild(child);
                        }
                    });
                } else {
                    toast("err", `DELETE failed: ${(await r.json()).error}`);
                }
            }

            function toggleScroll() {
                enableScroll = !enableScroll;
            }

            // ── MULTI LOGS ───────────────────────────────────────────────────────────────
            async function toggleLogs(id, name) {
                const container = document.getElementById(`logs-container`);

                if (!container.classList.contains(`have-${id}`)) {
                    container.classList.add(`have-${id}`);

                    // load history
                    const r = await fetch(`/api/scripts/${id}/logs`);
                    const lines = await r.json();
                    lines.forEach((log_obj) => {
                        const [ts, l] = log_obj;
                        logItem = document.createElement("div");
                        logItem.className = `log-output from-${id}`;
                        logItem.dataset.ts = ts;

                        const sourceBadge = document.createElement("span");
                        sourceBadge.className = "no-selection";
                        sourceBadge.style = `background: ${configToColor.get(id)}; cursor: default;`;
                        sourceBadge.dataset.bsToggle = "tooltip";
                        sourceBadge.dataset.bsPlacement = "top";
                        sourceBadge.title = `${id} | ${new Date(ts).toLocaleString()}`;
                        sourceBadge.innerText = "\u00A0\u00A0";

                        const divider = document.createElement("span");
                        divider.className = "no-selection";
                        divider.innerText = " | ";

                        logItem.innerHTML = `${sourceBadge.outerHTML}${divider.outerHTML}${l}`;
                        insertLogItem(ts, logItem);
                        // container.appendChild(logItem);
                    });

                    // start stream
                    const src = new EventSource(`/api/scripts/${id}/stream`);
                    streams.set(id, src);

                    src.onmessage = (m) => {
                        const log_obj = JSON.parse(m.data);
                        const [ts, line] = log_obj;
                        logItem = document.createElement("div");
                        logItem.className = `log-output from-${id}`;
                        logItem.dataset.ts = ts;

                        const sourceBadge = document.createElement("span");
                        sourceBadge.className = "no-selection";
                        sourceBadge.style = `background: ${configToColor.get(id)}; cursor: default;`;
                        sourceBadge.dataset.bsToggle = "tooltip";
                        sourceBadge.dataset.bsPlacement = "top";
                        sourceBadge.title = `${id} | ${new Date(ts).toLocaleString()}`;
                        sourceBadge.innerText = "\u00A0\u00A0";

                        const divider = document.createElement("span");
                        divider.className = "no-selection";
                        divider.innerText = " | ";

                        logItem.innerHTML = `${sourceBadge.outerHTML}${divider.outerHTML}${line}`;
                        insertLogItem(ts, logItem);
                        // container.appendChild(logItem);
                        if (enableScroll) {
                            container.scrollTop = container.scrollHeight;
                        }
                    };

                    src.onerror = () => {
                        src.close();
                        streams.delete(id);
                    };
                } else {
                    container.classList.remove(`have-${id}`);
                    // stop stream
                    const src = streams.get(id);
                    if (src) {
                        src.close();
                        streams.delete(id);
                    }

                    [...container.children].forEach((child) => {
                        if (child.classList.contains(`from-${id}`)) {
                            container.removeChild(child);
                        }
                    });
                }
            }

            function insertLogItem(ts, logItem) {
                const container = document.getElementById("logs-container");
                if (container.children.length == 0) {
                    container.appendChild(logItem);
                    return;
                }
                for (var i = container.children.length - 1; i >= 0; i--) {
                    const el = container.children[i];
                    if (parseInt(el.dataset.ts) < ts) {
                        el.after(logItem);
                        return;
                    }
                }
                container.prepend(logItem);
            }

            // ── TOAST ─────────────────────────────────────────────────────────────────────
            function toast(type, msg) {
                const el = document.createElement("div");
                el.className = `toast ${type}`;
                el.textContent = (type === "ok" ? "✓ " : "✗ ") + msg;
                $("toast-wrap").appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }

            function esc(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;");
            }
        </script>

            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"

            crossorigin="anonymous"
        ></script>
    </body>
