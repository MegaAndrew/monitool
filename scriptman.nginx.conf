# /etc/nginx/sites-available/scriptman
# Symlink to enable: ln -s /etc/nginx/sites-available/scriptman /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;      # ← change this (or use _ for any)

    # Optional: redirect HTTP → HTTPS (uncomment if you have a cert)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:7000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events / live log streaming)
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Timeouts — keep SSE connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

