name: Pack executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install compiler (required for Nuitka)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: monitool.py
          mode: onefile
          include-data-files: templates/*.html=templates/

      # Correct output path for onefile
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitool
          path: monitool.bin

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: monitool.bin
          asset_name: monitool-linux
          asset_content_type: application/octet-stream
